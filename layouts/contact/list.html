{{- define "main" }}

<div class="list-header">
  <h1>{{ .Title }}</h1>
  {{- with .Params.description }}<p class="page-description">{{ . }}</p>{{- end }}
</div>

<div class="content">
  <div class="post-grid">
    {{- with .Site.Params.socialIcons }}
    {{- range . }}
    <article class="post-card">
      <h2 class="post-card-title">
        <a href="{{ .url }}" target="_blank" rel="noopener noreferrer">{{ .name | humanize }}</a>
      </h2>
      <p class="post-card-summary">{{ .url }}</p>
    </article>
    {{- end }}
    {{- end }}
  </div>
</div>

{{- end }}
